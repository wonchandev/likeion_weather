# Render Blueprint — likelion weather 백엔드(Django) + PostgreSQL.
# 대시보드에서 "New +" → "Blueprint"로 이 저장소를 선택하면 아래 서비스가 생성된다.
databases:
  - name: likeion-weather-db
    plan: free
    databaseName: likeion_weather
    user: likeion_weather

services:
  - type: web
    name: likeion-weather-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn mysite.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: likeion-weather-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      # OpenWeather API 키 — 대시보드에서 직접 입력(민감정보라 저장소에 두지 않음).
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      # 프론트엔드(Vercel) 배포 후 실제 도메인으로 채운다. 예: https://likeion-weather.vercel.app
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
